哔哩哔哩 = select,DIRECT,🇭🇰香港,🇨🇳台湾,🇸🇬新加坡,🇯🇵日本,🇺🇸美国

# ========== 节点地区分组  ========= #
♻️自动选择 = url-test,select=0,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?=.*(.))(?!.*(网易|墨鱼|内地|大陆|回国|校园|群|邀请|推荐|客户端|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|游戏|🎮|50|100|200|300|400|500|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|Game)).*$,interval=900,timeout=5,tolerance=0
🇭🇰香港 = url-test,select=0,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?=.*(🇭🇰|香港|港|\\bHK\\b|HKG|Hong Kong|Hong))(?!.*(回国|校园|游戏|🎮|Game)).*,interval=900,timeout=5,tolerance=0
🇨🇳台湾 = url-test,select=0,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?=.*(🇨🇳|台湾|台|灣|\\bTW\\b|TWN|Taiwan|Taipei))(?!.*(回国|校园|游戏|🎮|Game)).*,interval=900,timeout=5,tolerance=0
🇸🇬新加坡 = url-test,select=0,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?=.*(🇸🇬|新加坡|\\bSG\\b|SGP|狮|獅|Singapore))(?!.*(回国|校园|游戏|🎮|Game)).*,interval=900,timeout=5,tolerance=0
🇯🇵日本 = url-test,select=0,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?=.*(🇯🇵|日本|东京|大阪|\\bJP\\b|JPN|Japan|Tokyo|Osaka))(?!.*(回国|校园|游戏|🎮|Game)).*,interval=900,timeout=5,tolerance=0
🇺🇸美国 = url-test,select=0,url=http://www.gstatic.com/generate_204,policy-regex-filter=(?i)^(?=.*(🇺🇸|美国|华盛顿|洛杉矶|\\bUS\\b|USA|United States|America|Los Angeles|New York))(?!.*(回国|校园|游戏|🎮|Game)).*,interval=900,timeout=5,tolerance=0

