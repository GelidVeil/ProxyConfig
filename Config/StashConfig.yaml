#========= 基础设置 ========#
mode: rule
log-level: info
#========= DNS ========#
dns:
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 180.184.1.1
    - 114.114.114.114
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.market.xiaomi.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - '*.battlenet.com.cn'
    - '*.battlenet.com'
    - '*.blzstatic.cn'
    - '*.battle.net'
    - time.*.com
    - ntp.*.com
    - localhost.ptlogin2.qq.com
#========= 订阅链接 =========#
proxy-providers:
  Sub1:
    url: 此处填入你的订阅
    benchmark-url: http://www.gstatic.com/generate_204
    benchmark-timeout: 5
    interval: 86400
  Sub2:
    url: 此处填入你的订阅
    benchmark-url: http://www.gstatic.com/generate_204
    benchmark-timeout: 5
    interval: 86400
#========= 策略组 ========#
proxy-groups:
  - name: 全球畅连
    type: select
    proxies: [♻️自动选择, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png
  - name: 国际社交
    type: select
    proxies: [♻️自动选择, 🇭🇰香港, 🇨🇳台湾, 🇸🇬新加坡, 🇯🇵日本, 🇺🇸美国]
